<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer braided rope border -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#8B6F54" stroke-width="8"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="#A07422" stroke-width="3" stroke-dasharray="12 6"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="#8B6F54" stroke-width="2"/>

  <!-- Background fill -->
  <circle cx="256" cy="256" r="234" fill="#FAF6EE"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#E8DCC0" stroke-width="1.5"/>

  <!-- Wheat stalks - top -->
  <g fill="#C8922A" opacity="0.9">
    <ellipse cx="180" cy="90" rx="4" ry="10" transform="rotate(-20 180 90)"/>
    <ellipse cx="175" cy="78" rx="3.5" ry="9" transform="rotate(-25 175 78)"/>
    <ellipse cx="185" cy="79" rx="3.5" ry="9" transform="rotate(-15 185 79)"/>
    <line x1="180" y1="100" x2="190" y2="140" stroke="#A07422" stroke-width="2"/>
    <ellipse cx="332" cy="90" rx="4" ry="10" transform="rotate(20 332 90)"/>
    <ellipse cx="337" cy="78" rx="3.5" ry="9" transform="rotate(25 337 78)"/>
    <ellipse cx="327" cy="79" rx="3.5" ry="9" transform="rotate(15 327 79)"/>
    <line x1="332" y1="100" x2="322" y2="140" stroke="#A07422" stroke-width="2"/>
  </g>

  <!-- Pig - left -->
  <g transform="translate(105, 220)" fill="#D4785C">
    <ellipse cx="0" cy="0" rx="22" ry="16"/>
    <circle cx="-18" cy="-8" r="8"/>
    <ellipse cx="-24" cy="-6" rx="5" ry="4" fill="#E8917A"/>
    <circle cx="-21" cy="-10" r="2" fill="#5C3D2E"/>
    <rect x="-10" y="12" width="4" height="8" rx="1" fill="#C96650"/>
    <rect x="4" y="12" width="4" height="8" rx="1" fill="#C96650"/>
  </g>

  <!-- Chicken - top left -->
  <g transform="translate(155, 145)" fill="#DEB887">
    <ellipse cx="0" cy="0" rx="14" ry="12"/>
    <circle cx="-8" cy="-10" r="7" fill="#DEB887"/>
    <polygon points="-14,-10 -18,-8 -14,-7" fill="#C8922A"/>
    <circle cx="-10" cy="-11" r="1.5" fill="#5C3D2E"/>
    <polygon points="-6,-16 -8,-20 -4,-18 -6,-22 -2,-19" fill="#B5452F"/>
    <path d="M12,-4 Q20,-10 16,-2" fill="none" stroke="#A07422" stroke-width="1.5"/>
    <path d="M12,-2 Q22,-6 17,2" fill="none" stroke="#A07422" stroke-width="1.5"/>
  </g>

  <!-- Dog - right -->
  <g transform="translate(395, 230)" fill="#7A5E47">
    <ellipse cx="0" cy="0" rx="20" ry="14"/>
    <circle cx="16" cy="-10" r="10"/>
    <ellipse cx="22" cy="-8" rx="4" ry="3" fill="#5C3D2E"/>
    <circle cx="19" cy="-12" r="2" fill="#3D271D"/>
    <ellipse cx="10" cy="-18" rx="5" ry="8" transform="rotate(-15 10 -18)" fill="#5C3D2E"/>
    <ellipse cx="22" cy="-18" rx="5" ry="8" transform="rotate(15 22 -18)" fill="#5C3D2E"/>
    <rect x="-8" y="10" width="4" height="10" rx="1" fill="#6B4D3A"/>
    <rect x="4" y="10" width="4" height="10" rx="1" fill="#6B4D3A"/>
    <path d="M-18,0 Q-28,-8 -22,-14" fill="none" stroke="#7A5E47" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Cat - bottom right -->
  <g transform="translate(360, 340)" fill="#9B7FA8">
    <ellipse cx="0" cy="0" rx="14" ry="11"/>
    <circle cx="12" cy="-8" r="8"/>
    <polygon points="8,-16 6,-24 12,-18" fill="#9B7FA8"/>
    <polygon points="16,-16 18,-24 14,-18" fill="#9B7FA8"/>
    <circle cx="10" cy="-9" r="1.5" fill="#5C3D2E"/>
    <circle cx="15" cy="-9" r="1.5" fill="#5C3D2E"/>
    <line x1="18" y1="-6" x2="28" y2="-8" stroke="#5C3D2E" stroke-width="0.5"/>
    <line x1="18" y1="-4" x2="28" y2="-4" stroke="#5C3D2E" stroke-width="0.5"/>
    <path d="M-14,0 Q-24,4 -20,-8 Q-16,-16 -22,-12" fill="none" stroke="#9B7FA8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Chicken - top right -->
  <g transform="translate(345, 145)" fill="#F5ECD7">
    <ellipse cx="0" cy="0" rx="13" ry="11"/>
    <circle cx="8" cy="-9" r="7" fill="#F5ECD7"/>
    <polygon points="14,-9 18,-7 14,-6" fill="#C8922A"/>
    <circle cx="10" cy="-10" r="1.5" fill="#5C3D2E"/>
    <polygon points="6,-15 8,-19 4,-17 6,-21 2,-18" fill="#B5452F"/>
  </g>

  <!-- Pig - bottom left -->
  <g transform="translate(140, 340)" fill="#E8917A">
    <ellipse cx="0" cy="0" rx="18" ry="13"/>
    <circle cx="-14" cy="-6" r="7"/>
    <ellipse cx="-19" cy="-4" rx="4" ry="3" fill="#D4785C"/>
    <circle cx="-16" cy="-8" r="1.5" fill="#5C3D2E"/>
    <rect x="-6" y="10" width="3" height="7" rx="1" fill="#D4785C"/>
    <rect x="4" y="10" width="3" height="7" rx="1" fill="#D4785C"/>
  </g>

  <!-- Water symbols - bottom -->
  <g fill="none" stroke="#6B9BC3" stroke-width="2" opacity="0.7">
    <path d="M220,400 Q230,392 240,400 Q250,408 260,400"/>
    <path d="M250,410 Q260,402 270,410 Q280,418 290,410"/>
  </g>

  <!-- Coffee cup - bottom center -->
  <g transform="translate(256, 395)" fill="#B87333">
    <rect x="-8" y="-6" width="16" height="14" rx="2"/>
    <path d="M8,0 Q14,0 14,5 Q14,10 8,10" fill="none" stroke="#B87333" stroke-width="2"/>
    <path d="M-3,-10 Q-1,-16 1,-10" fill="none" stroke="#B87333" stroke-width="1" opacity="0.5"/>
    <path d="M3,-10 Q5,-16 7,-10" fill="none" stroke="#B87333" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Herb/leaf accents -->
  <g fill="#4A7C3F" opacity="0.6">
    <ellipse cx="120" cy="170" rx="4" ry="10" transform="rotate(-40 120 170)"/>
    <ellipse cx="115" cy="175" rx="3" ry="8" transform="rotate(-60 115 175)"/>
    <ellipse cx="390" cy="170" rx="4" ry="10" transform="rotate(40 390 170)"/>
    <ellipse cx="395" cy="175" rx="3" ry="8" transform="rotate(60 395 175)"/>
    <ellipse cx="180" cy="390" rx="3" ry="8" transform="rotate(30 180 390)"/>
    <ellipse cx="330" cy="390" rx="3" ry="8" transform="rotate(-30 330 390)"/>
  </g>

  <!-- Two figures at center - silhouettes -->
  <g fill="#5C3D2E">
    <!-- Left figure -->
    <circle cx="236" cy="235" r="14"/>
    <path d="M224,250 Q224,290 228,310 L244,310 Q248,290 248,250 Z"/>
    <path d="M244,260 Q252,255 256,258" fill="none" stroke="#5C3D2E" stroke-width="5" stroke-linecap="round"/>
    <!-- Right figure -->
    <circle cx="276" cy="230" r="15"/>
    <path d="M262,246 Q262,288 266,310 L286,310 Q290,288 290,246 Z"/>
    <path d="M262,256 Q254,252 256,258" fill="none" stroke="#5C3D2E" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Small heart between figures -->
  <path d="M256,270 Q252,264 248,268 Q244,272 256,282 Q268,272 264,268 Q260,264 256,270" fill="#B5452F" opacity="0.7"/>

  <!-- Text arc - top -->
  <path id="topArc" d="M130,256 A126,126 0 0,1 382,256" fill="none"/>
  <text font-family="Georgia, serif" font-size="18" fill="#5C3D2E" font-weight="600" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">DAILY CHORES</textPath>
  </text>

  <!-- Decorative dots -->
  <g fill="#C8922A" opacity="0.4">
    <circle cx="256" cy="60" r="2.5"/>
    <circle cx="310" cy="70" r="2"/>
    <circle cx="202" cy="70" r="2"/>
    <circle cx="350" cy="100" r="2"/>
    <circle cx="162" cy="100" r="2"/>
    <circle cx="60" cy="256" r="2.5"/>
    <circle cx="452" cy="256" r="2.5"/>
    <circle cx="70" cy="310" r="2"/>
    <circle cx="442" cy="310" r="2"/>
    <circle cx="70" cy="202" r="2"/>
    <circle cx="442" cy="202" r="2"/>
  </g>
</svg>
